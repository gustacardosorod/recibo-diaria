<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Recibo de Diária – Viação Águia Branca</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --azul: #003087;
      --azul-m: #1a4db5;
      --azul-claro: #e8eef8;
      --amarelo: #0099ff;
      --amarelo-esc: #007be0fb;
      --branco: #ffffff;
      --cinza-bg: #f4f6fb;
      --cinza-bd: #d6dce8;
      --texto: #1a1a2e;
      --muted: #6b7a99;
      --verde: #1a7a3a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--cinza-bg);
      color: var(--texto);
      min-height: 100vh;
    }

    .header {
      background: var(--azul);
      border-bottom: 4px solid var(--amarelo);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 72px;
    }

    .header-brand {
      display: flex;
      flex-direction: column;
      justify-content: center;
      line-height: 1.2;
    }

    .header-brand strong {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--branco);
      letter-spacing: 0.04em;
    }

    .header-brand span {
      font-size: 0.72rem;
      color: var(--amarelo);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .header-right {
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.55);
      text-align: right;
      line-height: 1.5;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 1.5rem;
      align-items: start;
    }

    @media (max-width: 820px) {
      .two-col {
        grid-template-columns: 1fr;
      }
    }

    .form-card {
      background: var(--branco);
      border: 1px solid var(--cinza-bd);
      border-radius: 12px;
      overflow: hidden;
    }

    .form-section-head {
      background: var(--azul);
      color: var(--branco);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 16px;
      border-left: 4px solid var(--amarelo);
    }

    .form-section-body {
      padding: 1rem 1.25rem;
    }

    .form-section-body+.form-section-head {
      border-top: 1px solid var(--cinza-bd);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 600px) {

      .grid-2,
      .grid-4 {
        grid-template-columns: 1fr;
      }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input,
    select,
    textarea {
      border: 1px solid var(--cinza-bd);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 0.9rem;
      font-family: 'Barlow', sans-serif;
      color: var(--texto);
      background: var(--branco);
      width: 100%;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--azul-m);
      box-shadow: 0 0 0 3px rgba(26, 77, 181, 0.12);
    }

    .field-readonly input {
      background: var(--cinza-bg);
      color: var(--muted);
      cursor: default;
    }

    .adicional-row {
      display: grid;
      grid-template-columns: 1fr 120px 32px;
      gap: 8px;
      align-items: center;
      margin-bottom: 6px;
    }

    .btn-rm {
      width: 32px;
      height: 34px;
      border: 1px solid var(--cinza-bd);
      border-radius: 6px;
      background: var(--cinza-bg);
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }

    .btn-rm:hover {
      background: #fde8e8;
      border-color: #e57373;
      color: #c62828;
    }

    .btn-add-item {
      width: 100%;
      margin-top: 6px;
      padding: 8px;
      background: none;
      border: 1.5px dashed var(--cinza-bd);
      border-radius: 6px;
      font-size: 0.82rem;
      color: var(--muted);
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      transition: all .15s;
    }

    .btn-add-item:hover {
      border-color: var(--azul-m);
      color: var(--azul);
      background: var(--azul-claro);
    }

    .total-bar {
      background: var(--azul);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
    }

    .total-bar .lbl {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.65);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .total-bar .val {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--amarelo);
      font-family: 'Barlow Condensed', sans-serif;
    }

    .btn-gerar {
      width: 100%;
      margin-top: 1rem;
      padding: 13px;
      background: var(--amarelo);
      color: var(--azul);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-gerar:hover {
      background: var(--amarelo-esc);
    }

    .preview-card {
      background: var(--branco);
      border: 1px solid var(--cinza-bd);
      border-radius: 12px;
      overflow: hidden;
      position: sticky;
      top: 1.5rem;
    }

    .preview-head {
      background: var(--azul);
      border-bottom: 3px solid var(--amarelo);
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .preview-head span {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--branco);
      text-transform: uppercase;
    }

    .preview-body {
      padding: 1.25rem;
      font-size: 0.82rem;
      line-height: 1.6;
    }

    .rec-top {
      text-align: center;
      border-bottom: 2px solid var(--azul);
      padding-bottom: 12px;
      margin-bottom: 14px;
    }

    .rec-top h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--azul);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .rec-top p {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .rec-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 10px;
      margin-bottom: 12px;
    }

    .rec-info-item .lbl {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .rec-info-item .val {
      font-weight: 600;
      color: var(--texto);
    }

    .rec-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.78rem;
      margin-bottom: 12px;
    }

    .rec-table th {
      background: var(--azul);
      color: var(--branco);
      padding: 5px 8px;
      text-align: left;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .rec-table th:last-child {
      text-align: right;
    }

    .rec-table td {
      padding: 5px 8px;
      border-bottom: 0.5px solid var(--cinza-bd);
    }

    .rec-table td:last-child {
      text-align: right;
    }

    .rec-table tr:nth-child(even) td {
      background: var(--cinza-bg);
    }

    .rec-table .total-row td {
      background: var(--azul);
      color: var(--branco);
      font-weight: 700;
      border: none;
      font-size: 0.85rem;
    }

    .btn-download {
      width: 100%;
      margin-top: 1rem;
      padding: 11px;
      background: var(--azul);
      color: var(--branco);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-download:hover {
      background: var(--azul-m);
    }

    .btn-download:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted);
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--verde);
      color: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transform: translateY(10px);
      transition: all .3s;
      pointer-events: none;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="header-brand">
      <strong>Viação Águia Branca</strong>
      <span>Recibo de Diária de Motorista</span>
    </div>
    <div class="header-right">
      Sistema interno<br />Uso exclusivo
    </div>
  </div>

  <div class="page">
    <div class="two-col">
      <!-- FORMULÁRIO -->
      <div>
        <div class="form-card">
          <div class="form-section-head">Dados da Empresa</div>
          <div class="form-section-body">
            <div class="grid-2">
              <div class="field field-readonly">
                <label>Empresa</label>
                <input type="text" id="empresa" value="" readonly placeholder="Selecione o CNPJ…" />
              </div>
              <div class="field">
                <label>CNPJ</label>
                <select id="cnpj" onchange="preencherEmpresa(this)">
                  <option value="">Selecione o CNPJ…</option>
                  {% for c in cnpjs %}
                  <option value="{{ c.value }}" data-label="{{ c.label }}">{{ c.value }}</option>
                  {% endfor %}
                </select>
              </div>
            </div>
          </div>

          <div class="form-section-head">Dados do Motorista</div>
          <div class="form-section-body">
            <div class="grid-2">
              <div class="field">
                <label>Matrícula</label>
                <input type="text" id="matricula" placeholder="Ex: 00123456" oninput="atualizar()" />
              </div>
              <div class="field">
                <label>Nome completo</label>
                <input type="text" id="nome" placeholder="Nome do motorista" oninput="atualizar()" />
              </div>
            </div>
          </div>

          <div class="form-section-head">Dados da Viagem</div>
          <div class="form-section-body" style="display:flex;flex-direction:column;gap:10px;">
            <div class="field">
              <label>Código do Serviço (Sigla)</label>
              <input type="text" id="codigo_servico" placeholder="Ex: SQUAD_TUR_027" oninput="atualizar()" />
            </div>
            <div class="field">
              <label>Destino</label>
              <input type="text" id="destino" placeholder="Ex: Vitória / ES → São Paulo / SP" oninput="atualizar()" />
            </div>
            <div class="grid-4">
              <div class="field">
                <label>Data partida</label>
                <input type="date" id="data_partida" oninput="atualizar()" />
              </div>
              <div class="field">
                <label>Horário partida</label>
                <input type="time" id="hora_partida" oninput="atualizar()" />
              </div>
              <div class="field">
                <label>Data chegada</label>
                <input type="date" id="data_chegada" oninput="atualizar()" />
              </div>
              <div class="field">
                <label>Horário chegada</label>
                <input type="time" id="hora_chegada" oninput="atualizar()" />
              </div>
            </div>
          </div>

          <div class="form-section-head">Diárias</div>
          <div class="form-section-body">
            <div class="grid-2">
              <div class="field">
                <label>Quantidade de diárias</label>
                <input type="number" id="qtd_diarias" min="1" value="1" oninput="atualizar()" />
              </div>
              <div class="field">
                <label>Valor da diária (R$)</label>
                <input type="number" id="valor_diaria" min="0" step="0.01" placeholder="0,00" oninput="atualizar()" />
              </div>
            </div>
          </div>

          <div class="form-section-head">Custos Adicionais</div>
          <div class="form-section-body">
            <div id="add-list"></div>
            <button class="btn-add-item" onclick="adicionarItem()">+ Adicionar item (alimentação, hotelaria,
              pedágio…)</button>
          </div>
        </div>

        <div class="total-bar">
          <span class="lbl">Total a pagar</span>
          <span class="val" id="total-display">R$ 0,00</span>
        </div>

        <button class="btn-gerar" onclick="gerarRecibo()">
          ✦ Gerar recibo &amp; baixar PDF
        </button>
      </div>

      <!-- PREVIEW -->
      <div class="preview-col">
        <div class="preview-card">
          <div class="preview-head">
            <span>Pré-visualização</span>
            <span id="rec-num" style="color:var(--amarelo);font-size:0.75rem;"></span>
          </div>
          <div class="preview-body" id="preview-body">
            <div class="empty-state">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
              </svg>
              <p>Preencha o formulário para<br />visualizar o recibo aqui.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">PDF gerado com sucesso!</div>

  <script>
    let adicionais = [];
    const TIPOS = JSON.parse('{{ tipos | tojson | safe }}');
    
    document.getElementById('cnpj').addEventListener('change', atualizar);

    function fmt(v) {
      return 'R$ ' + (parseFloat(v || 0)).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtData(d) {
      if (!d) return '';
      const [y, m, dia] = d.split('-');
      return `${dia}/${m}/${y}`;
    }

    function adicionarItem() {
      adicionais.push({ id: Date.now(), tipo: '', valor: '' });
      renderAdicionais();
    }

    function removerItem(id) {
      adicionais = adicionais.filter(i => i.id !== id);
      renderAdicionais();
      atualizar();
    }

    function renderAdicionais() {
      const list = document.getElementById('add-list');
      list.innerHTML = '';
      adicionais.forEach((item, idx) => {
        const row = document.createElement('div');
        row.className = 'adicional-row';
        const opts = TIPOS.map(t => `<option value="${t}" ${item.tipo === t ? 'selected' : ''}>${t}</option>`).join('');
        row.innerHTML = `
      <select onchange="adicionais[${idx}].tipo=this.value;atualizar()">
        <option value="">Tipo…</option>${opts}
      </select>
      <input type="number" step="0.01" placeholder="R$ 0,00" value="${item.valor}" style="text-align:right;" oninput="adicionais[${idx}].valor=this.value;atualizar()"/>
      <button class="btn-rm" onclick="removerItem(${item.id})">×</button>
    `;
        list.appendChild(row);
      });
      atualizar();
    }

    function coletarDados() {
      const qtd = parseFloat(document.getElementById('qtd_diarias').value) || 0;
      const vunit = parseFloat(document.getElementById('valor_diaria').value) || 0;
      const sub = qtd * vunit;
      const extras = adicionais.reduce((a, i) => a + (parseFloat(i.valor) || 0), 0);
      const cnpjSel = document.getElementById('cnpj');

      // ← Lê o nome da empresa direto do data-label do option selecionado
      const empresaLabel = cnpjSel.options[cnpjSel.selectedIndex]?.dataset?.label || '';

      return {
        empresa: empresaLabel, // ← vem do CNPJ selecionado
        cnpj: cnpjSel.value,
        matricula: document.getElementById('matricula').value,
        nome: document.getElementById('nome').value,
        codigo_servico: document.getElementById('codigo_servico').value,
        destino: document.getElementById('destino').value,
        data_partida: document.getElementById('data_partida').value,
        hora_partida: document.getElementById('hora_partida').value,
        data_chegada: document.getElementById('data_chegada').value,
        hora_chegada: document.getElementById('hora_chegada').value,
        qtd_diarias: qtd,
        valor_diaria: vunit,
        subtotal: sub,
        adicionais: adicionais.filter(i => i.tipo || i.valor),
        total: sub + extras,
        hoje: new Date().toLocaleDateString('pt-BR')
      };
    }

    function atualizar() {
      const d = coletarDados();

      // ← Sincroniza o campo visual "Empresa" com o CNPJ selecionado
      const inputEmpresa = document.getElementById('empresa');
      if (inputEmpresa) inputEmpresa.value = d.empresa;

      document.getElementById('total-display').textContent = fmt(d.total);
      renderPreview(d);
      document.getElementById('btn-download').disabled = !d.nome;
    }

    function renderPreview(d) {
      const pb = document.getElementById('preview-body');
      const adRows = d.adicionais.map(i => `
    <tr>
      <td>${i.tipo || 'Adicional'}</td>
      <td style="text-align:center">—</td>
      <td style="text-align:right">—</td>
      <td style="text-align:right">${fmt(parseFloat(i.valor) || 0)}</td>
    </tr>
  `).join('');

      pb.innerHTML = `
    <div class="rec-top">
      <h2>Recibo de Pagamento</h2>
      <p>Diária de Motorista · ${d.empresa || '—'}</p>
    </div>
    <div class="rec-info-grid">
      <div class="rec-info-item"><div class="lbl">Empresa</div><div class="val">${d.empresa || '—'}</div></div>
      <div class="rec-info-item"><div class="lbl">CNPJ</div><div class="val">${d.cnpj || '—'}</div></div>
      <div class="rec-info-item"><div class="lbl">Matrícula</div><div class="val">${d.matricula || '—'}</div></div>
      <div class="rec-info-item"><div class="lbl">Motorista</div><div class="val">${d.nome || '—'}</div></div>
      ${d.codigo_servico ? `<div class="rec-info-item"><div class="lbl">Cód. Serviço</div><div class="val">${d.codigo_servico}</div></div>` : ''}
      <div class="rec-info-item" style="grid-column:1/-1"><div class="lbl">Destino</div><div class="val">${d.destino || '—'}</div></div>
      <div class="rec-info-item"><div class="lbl">Partida</div><div class="val">${fmtData(d.data_partida) || '—'} ${d.hora_partida || ''}</div></div>
      <div class="rec-info-item"><div class="lbl">Chegada</div><div class="val">${fmtData(d.data_chegada) || '—'} ${d.hora_chegada || ''}</div></div>
    </div>
    <table class="rec-table">
      <thead>
        <tr>
          <th>Descrição</th>
          <th style="text-align:center">Qtd.</th>
          <th style="text-align:right">Unit.</th>
          <th style="text-align:right">Total</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Diária de motorista</td>
          <td style="text-align:center">${d.qtd_diarias}</td>
          <td style="text-align:right">${fmt(d.valor_diaria)}</td>
          <td style="text-align:right">${fmt(d.subtotal)}</td>
        </tr>
        ${adRows}
        <tr class="total-row">
          <td colspan="3">Total geral</td>
          <td style="text-align:right">${fmt(d.total)}</td>
        </tr>
      </tbody>
    </table>
    <p style="text-align:center;font-size:0.65rem;color:var(--muted);margin-top:10px;">
      Emitido em ${d.hoje}
    </p>
  `;
    }

    async function baixarPDF() {
      const btn = document.querySelector('.btn-gerar');
      btn.disabled = true;
      btn.textContent = 'Gerando PDF…';

      try {
        const response = await fetch('/gerar-pdf', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(coletarDados())
        });

        if (!response.ok) throw new Error('Erro ao gerar PDF');

        const blob = await response.blob();
        const numero = response.headers.get('X-Recibo-Numero') || 'recibo';
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `recibo_aguia_branca_${numero}.pdf`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
      } catch (error) {
        console.error('Erro:', error);
        alert('Erro ao gerar PDF: ' + error.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '✦ Gerar recibo & baixar PDF';
      }
    }

    function gerarRecibo() {
      baixarPDF();
    }

    atualizar();
  </script>
</body>

</html>
