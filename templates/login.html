<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Viação Águia Branca</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #003087 0%, #002266 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: #003087;
            padding: 30px;
            text-align: center;
        }

        .login-header h1 {
            color: white;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #FFB800;
            font-size: 14px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .login-body {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: #003087;
            box-shadow: 0 0 0 3px rgba(0, 48, 135, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #003087;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background: #002266;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 48, 135, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .error-message {
            background: #fee;
            color: #c00;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #c00;
            animation: shake 0.3s ease-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .footer {
            text-align: center;
            padding: 20px 30px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #666;
        }

        .info {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
           <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" style="height:30;">
            <p>Sistema de Recibos</p>
        </div>
        
        <div class="login-body">
            {% if erro %}
            <div class="error-message">
                ⚠️ {{ erro }}
            </div>
            {% endif %}
            
            <form method="POST">
                <div class="form-group">
                    <label>👤 Usuário</label>
                    <input type="text" name="usuario" placeholder="Digite seu usuário" required autofocus>
                </div>
                
                <div class="form-group">
                    <label>🔒 Senha</label>
                    <input type="password" name="senha" placeholder="Digite sua senha" required>
                </div>
                
                <button type="submit">Entrar no Sistema</button>
            </form>
            
            <div class="info">
                <small>Sistema seguro - Acesso restrito</small>
            </div>
        </div>
        
        <div class="footer">
            © 2024 Viação Águia Branca - Todos os direitos reservados
        </div>
    </div>
</body>
</html>
